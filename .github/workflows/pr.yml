name: PR Checks & Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  checks:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --passWithNoTests --ci

  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: github.event.action != 'closed'

      - name: Set preview base URL
        if: github.event.action != 'closed'
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            config.expo.experiments.baseUrl = '/personal-trainner/pr-preview/pr-${{ github.event.pull_request.number }}';
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "

      - name: Build web
        if: github.event.action != 'closed'
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
