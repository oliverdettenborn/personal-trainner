name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --passWithNoTests --ci

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Add .nojekyll file
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          keep_files: true

      - name: Configure GitHub Pages source
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method PUT \
            -f build_type=legacy \
            -f source[branch]=gh-pages \
            -f source[path]=/ 2>/dev/null || \
          gh api repos/${{ github.repository }}/pages \
            --method POST \
            -f build_type=legacy \
            -f source[branch]=gh-pages \
            -f source[path]=/ 2>/dev/null || \
          echo "::warning::Could not auto-configure GitHub Pages. Go to Settings > Pages and set source to 'Deploy from a branch' → gh-pages / root."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
