name: Migrations

on:
  workflow_call:
    secrets:
      SUPABASE_DB_URL:
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }}
