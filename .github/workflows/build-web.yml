name: Build Web

on:
  workflow_call:
    inputs:
      EXPO_PUBLIC_SUPABASE_URL:
        required: true
        type: string
      EXPO_PUBLIC_SUPABASE_ANON_KEY:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ inputs.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ inputs.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
