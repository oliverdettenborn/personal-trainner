name: Release to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  # E2E Tests run in parallel after basic checks
  e2e-web:
    needs: checks
    uses: ./.github/workflows/e2e-web.yml

  # Production Build runs in parallel with E2E to save time
  build:
    needs: checks
    uses: ./.github/workflows/build-web.yml
    with:
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  # Migrate ONLY IF E2E passes, and MUST finish before deploy
  migrate:
    needs: [checks, e2e-web]
    uses: ./.github/workflows/migrate.yml
    secrets:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  # Deploy only after Build AND Migrate are successful
  deploy:
    needs: [build, migrate]
    uses: ./.github/workflows/deploy-pages.yml
